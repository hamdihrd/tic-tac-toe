<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="sidebar">
      <div>
        <div>
          <label for="gridSize">Grid Size</label>
          <input
            id="gridSize"
            type="number"
            placeholder="grid size [3..20] "
            required
            pattern="[3-20]"
          />
        </div>
        <div>
          <label for="nbreCellsWin">Nbre Cells Win</label>
          <input
            id="nbreCellsWin"
            type="number"
            placeholder="[3..gridSize] "
            required
            pattern="[3-gridSize]"
          />
        </div>
      </div>
      <div>
        <div class="player1">
          <label for="player1Name">Player 1 : ✖️</label>
          <input
            id="player1Name"
            type="text"
            placeholder="Player 1 Name"
            required
            pattern="^[a-zA-Z0-9]+$"
          />
          <div class="score1">SCORE = 0</div>
        </div>
        <div class="player2">
          <label for="player2Name">Player 2 : ⭕</label>
          <input
            id="player2Name"
            type="text"
            placeholder="Player 2 Name"
            required
            pattern="^[a-zA-Z0-9]+$"
          />
          <div class="score2">SCORE = 0</div>
        </div>
      </div>
      <div>
        <div class="start">Start</div>
        <!-- <div class="restart">Restart</div> -->
        <div class="resetGame">Reset Game</div>
      </div>
    </div>
    <div class="grid"></div>
  </body>
</html>
